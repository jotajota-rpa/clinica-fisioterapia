services:
  db:
    image: postgres:18-alpine
    container_name: postgres_db
    environment:
      - POSTGRES_DB=clinica_fisio
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
    ports:
      - "5432:5432"
    command: postgres -c shared_buffers=64MB
    volumes:
      - pgdata_nativo:/var/lib/postgresql/
    mem_limit: 512m
    cpus: 1

volumes:
  pgdata_nativo: